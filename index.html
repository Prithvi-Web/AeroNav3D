<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="AeroNav3D — interactive 3D globe powered by Cesium and Google Maps.">
<title>AeroNav3D — 3D Globe</title>

<!-- Cesium (free tier, CDN) -->
<script src="https://cesium.com/downloads/cesiumjs/releases/1.130/Build/Cesium/Cesium.js"></script>
<link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.130/Build/Cesium/Widgets/widgets.css">

<!-- Supabase (flight trails + favorites) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
  :root{
    --bg:#070a12;
    --panel:rgba(13,18,30,.78);
    --border:rgba(120,160,220,.16);
    --text:#dfe7f1;
    --muted:#7c8aa0;
    --accent:#4cc3ff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;background:var(--bg);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--text);}

  #globe{position:absolute;inset:0;}
  #globe .cesium-viewer,#globe .cesium-widget,#globe .cesium-widget canvas{width:100%;height:100%;}

  /* Keep Google/Cesium attribution visible (required), but style it subtly */
  .cesium-viewer-bottom{left:12px!important;bottom:10px!important;}
  .cesium-credit-logoContainer{display:none!important;}
  .cesium-widget-credits,.cesium-widget-credits a{
    color:var(--muted)!important;font-size:10px!important;text-decoration:none!important;}

  /* ---------- Branding ---------- */
  .brand{
    position:absolute;top:20px;left:20px;z-index:10;
    display:flex;align-items:center;gap:12px;
    padding:10px 16px 10px 12px;border-radius:12px;
    background:var(--panel);border:1px solid var(--border);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    user-select:none;
  }
  .brand svg{display:block;}
  .brand .name{font-size:17px;font-weight:700;letter-spacing:.04em;}
  .brand .name em{font-style:normal;color:var(--accent);}
  .brand .tag{font-size:10px;letter-spacing:.28em;color:var(--muted);margin-top:2px;text-transform:uppercase;}

  /* ---------- Search + map-style toggle (top centre) ---------- */
  .top-center{
    position:absolute;top:26px;left:50%;transform:translateX(-50%);z-index:12;
    display:flex;align-items:stretch;gap:10px;height:44px;
  }
  .search{
    width:min(400px,32vw);display:flex;align-items:center;gap:9px;
    padding:0 14px;border-radius:12px;
    background:var(--panel);border:1px solid var(--border);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    transition:border-color .2s,box-shadow .2s;
  }
  .search:focus-within{
    border-color:rgba(76,195,255,.45);
    box-shadow:0 1px 0 rgba(255,255,255,.13) inset,
               0 -1px 0 rgba(0,0,0,.30) inset,
               0 0 0 3px rgba(76,195,255,.14),
               0 10px 26px -8px rgba(0,0,0,.55);
  }
  .search .icon{color:var(--muted);font-size:14px;flex:none;}
  .search input{
    flex:1;min-width:0;background:none;border:none;outline:none;
    color:var(--text);font-size:13px;height:100%;
  }
  .search input::placeholder{color:var(--muted);}
  .map-toggle{
    position:relative;display:flex;align-items:stretch;width:176px;flex:none;
    padding:4px;border-radius:12px;
    background:var(--panel);border:1px solid var(--border);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    user-select:none;
  }
  .mt-thumb{
    position:absolute;top:4px;bottom:4px;left:4px;width:calc(50% - 4px);
    border-radius:9px;
    background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.05) 45%,rgba(0,0,0,.10));
    border:1px solid rgba(255,255,255,.18);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.28),0 2px 8px rgba(0,0,0,.45);
    transition:transform .32s cubic-bezier(.3,1.25,.4,1);
    pointer-events:none;
  }
  .mt-opt{
    position:relative;z-index:1;flex:1;border:none;background:none;cursor:pointer;
    color:var(--muted);font-size:11.5px;font-weight:600;letter-spacing:.07em;
    transition:color .25s;
  }
  .mt-opt.active{color:var(--text);}
  .mt-opt:hover{color:var(--text);}
  .search-chip{
    display:none;align-items:center;gap:6px;flex:none;cursor:pointer;
    font-size:11px;color:var(--accent);white-space:nowrap;
    background:rgba(76,195,255,.12);border:1px solid rgba(76,195,255,.35);
    border-radius:999px;padding:3px 10px;
  }
  .search-chip:hover{background:rgba(76,195,255,.22);}
  .search-results{
    position:absolute;top:66px;left:50%;transform:translateX(-50%);z-index:12;
    width:min(460px,92vw);max-height:60vh;overflow-y:auto;display:none;
    border-radius:12px;background:var(--panel);border:1px solid var(--border);
    backdrop-filter:blur(18px) saturate(140%);
    -webkit-backdrop-filter:blur(18px) saturate(140%);
    box-shadow:0 1px 0 rgba(255,255,255,.13) inset,0 24px 50px -16px rgba(0,0,0,.7);
    scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.14) transparent;
  }
  .sr-group{font-size:9px;letter-spacing:.2em;color:var(--muted);padding:9px 14px 3px;}
  .sr-item{
    display:flex;align-items:center;gap:10px;width:100%;text-align:left;
    padding:9px 14px;background:none;border:none;color:var(--text);
    cursor:pointer;font-size:13px;
  }
  .sr-item:hover,.sr-item.active{background:rgba(60,85,130,.38);}
  .sr-item img{width:24px;height:24px;border-radius:5px;background:#fff;
    object-fit:contain;padding:1px;flex:none;}
  .sr-item .glyph{width:24px;text-align:center;color:var(--accent);flex:none;font-size:15px;}
  .sr-item .t{flex:1;min-width:0;}
  .sr-item .t small{display:block;color:var(--muted);font-size:11px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sr-item .badge{font-size:9px;letter-spacing:.15em;color:#39ff8e;flex:none;}
  .sr-empty{padding:12px 14px;font-size:12px;color:var(--muted);line-height:1.5;}

  /* ---------- Plane hover tooltip ---------- */
  .plane-tip{
    position:absolute;z-index:15;display:none;align-items:center;gap:7px;
    padding:5px 10px;border-radius:9px;white-space:nowrap;pointer-events:none;
    background:rgba(13,18,30,.92);border:1px solid rgba(255,255,255,.14);
    font-size:12.5px;font-weight:700;letter-spacing:.05em;
    transform:translate(-50%,-135%);
    box-shadow:0 6px 18px rgba(0,0,0,.5);
  }
  .plane-tip img{width:18px;height:18px;border-radius:4px;background:#fff;
    object-fit:contain;padding:1px;display:none;}

  /* ---------- Controls ---------- */
  .controls{
    position:absolute;right:20px;bottom:28px;z-index:10;
    display:flex;flex-direction:column;gap:8px;
  }
  .controls button{
    width:42px;height:42px;border-radius:10px;cursor:pointer;
    background:var(--panel);border:1px solid var(--border);color:var(--text);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    font-size:17px;line-height:1;display:flex;align-items:center;justify-content:center;
    transition:background .15s,border-color .15s,transform .1s;
  }
  .controls button:hover{background:rgba(40,55,85,.85);border-color:rgba(120,180,255,.4);}
  .controls button:active{transform:scale(.94);}
  .controls .divider{height:1px;background:var(--border);margin:2px 4px;}

  /* ---------- Hint / status ---------- */
  .hint{
    position:absolute;left:50%;bottom:28px;transform:translateX(-50%);z-index:10;
    padding:8px 16px;border-radius:999px;white-space:nowrap;
    background:var(--panel);border:1px solid var(--border);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    font-size:11px;color:var(--muted);letter-spacing:.06em;
    transition:opacity .8s;pointer-events:none;
  }
  .notice{
    position:absolute;top:72px;right:20px;z-index:10;max-width:320px;
    padding:12px 14px;border-radius:10px;font-size:12px;line-height:1.5;
    background:rgba(60,35,10,.85);border:1px solid rgba(255,170,60,.35);color:#ffd9a0;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:none;
  }
  /* ---------- Flight detail panel ---------- */
  .panel{
    position:absolute;top:96px;left:20px;z-index:10;width:344px;
    background:var(--panel);border:1px solid var(--border);border-radius:14px;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    overflow:hidden;
    opacity:0;visibility:hidden;pointer-events:none;
    transform:translateY(-12px) scale(.95);
    transition:opacity .35s ease,
      transform .35s cubic-bezier(.16,1,.3,1),
      visibility 0s linear .35s;
  }
  .panel.open{
    opacity:1;visibility:visible;pointer-events:auto;
    transform:translateY(0) scale(1);
    transition:opacity .35s ease,
      transform .35s cubic-bezier(.16,1,.3,1),
      visibility 0s;
  }
  .panel-head{display:flex;justify-content:space-between;align-items:flex-start;
    padding:12px 14px 10px;border-bottom:1px solid var(--border);}
  .panel-callsign{font-size:24px;font-weight:700;letter-spacing:.05em;}
  .panel-ident{display:flex;align-items:center;gap:12px;}
  .panel-logo{width:42px;height:42px;border-radius:8px;background:#fff;
    object-fit:contain;padding:3px;display:none;}
  .panel-sub{font-size:14px;color:var(--muted);margin-top:3px;}
  .panel-head button{background:none;border:none;color:var(--muted);
    font-size:14px;cursor:pointer;padding:2px 4px;line-height:1;}
  .panel-head button:hover{color:var(--text);}
  .panel-photo{position:relative;display:none;border-bottom:1px solid var(--border);}
  .panel-photo img{display:block;width:100%;height:210px;object-fit:cover;}
  .panel-photo a{
    position:absolute;right:6px;bottom:6px;font-size:9px;letter-spacing:.04em;
    color:rgba(255,255,255,.9);background:rgba(0,0,0,.5);padding:2px 7px;
    border-radius:6px;text-decoration:none;
  }
  .panel-photo a:hover{background:rgba(0,0,0,.75);}
  .ph-nav{
    position:absolute;top:50%;transform:translateY(-50%);left:8px;
    width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;
    display:none;align-items:center;justify-content:center;
    background:rgba(10,14,22,.55);color:#fff;font-size:17px;line-height:1;
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    transition:background .15s;padding-bottom:2px;
  }
  .ph-nav.next{left:auto;right:8px;}
  .ph-nav:hover{background:rgba(10,14,22,.85);}
  .ph-count{
    position:absolute;left:8px;bottom:6px;display:none;
    font-size:9px;letter-spacing:.08em;color:rgba(255,255,255,.9);
    background:rgba(10,14,22,.55);border-radius:6px;padding:2px 7px;
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  }
  /* FR24-style departure → arrival strip under the aircraft photo */
  .panel-route{display:none;padding:13px 14px;border-bottom:1px solid var(--border);}
  .route-strip{display:flex;align-items:center;position:relative;}
  .route-strip::before{content:"";position:absolute;left:50%;top:2px;bottom:2px;
    width:1px;background:var(--border);}
  .route-ap{flex:1;min-width:0;text-align:center;}
  .route-ap b{display:block;font-size:27px;font-weight:700;letter-spacing:.02em;}
  .route-ap span{display:block;margin-top:3px;font-size:10px;font-weight:600;
    color:var(--muted);text-transform:uppercase;letter-spacing:.08em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .route-mid{position:relative;z-index:1;flex:0 0 36px;width:36px;height:36px;
    border-radius:50%;background:var(--accent);
    display:flex;align-items:center;justify-content:center;}
  .route-mid svg{display:block;transform:rotate(90deg);}
  .route-note{font-size:11px;color:var(--muted);line-height:1.5;text-align:center;}
  .route-strip+.route-note{margin-top:8px;}
  .panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 14px;padding:14px 16px;}
  .panel-grid span{display:block;font-size:10px;letter-spacing:.18em;color:var(--muted);}
  .panel-grid b{font-size:17px;font-weight:600;}

  /* ---------- Favorites / auth ---------- */
  .panel-head .actions{display:flex;gap:2px;}
  #fpStar.active{color:#ffd76a;}
  .mf-toggle{
    position:absolute;top:20px;right:20px;z-index:10;cursor:pointer;
    display:flex;align-items:center;gap:7px;padding:10px 14px;border-radius:12px;
    background:var(--panel);border:1px solid var(--border);color:var(--text);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    font-size:12px;letter-spacing:.06em;
  }
  .mf-toggle:hover{background:rgba(40,55,85,.85);border-color:rgba(120,180,255,.4);}
  .mf-toggle .star{color:#ffd76a;font-size:14px;}
  .mf-panel{
    position:absolute;top:72px;right:20px;z-index:11;width:248px;
    background:var(--panel);border:1px solid var(--border);border-radius:12px;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    display:none;overflow:hidden;
  }
  .mf-head{display:flex;justify-content:space-between;align-items:center;
    padding:12px 14px 10px;border-bottom:1px solid var(--border);}
  .mf-title{font-size:13px;font-weight:700;letter-spacing:.08em;}
  .mf-head a{color:var(--muted);font-size:11px;text-decoration:none;cursor:pointer;}
  .mf-head a:hover{color:var(--text);}
  .mf-list{max-height:290px;overflow-y:auto;}
  .mf-empty{padding:16px 14px;font-size:12px;color:var(--muted);line-height:1.5;}
  .mf-item{display:flex;align-items:center;gap:9px;width:100%;text-align:left;
    padding:10px 14px;background:none;border:none;border-bottom:1px solid var(--border);
    color:var(--text);cursor:pointer;font-size:13px;}
  .mf-item:last-child{border-bottom:none;}
  .mf-item:hover{background:rgba(40,55,85,.6);}
  .mf-item .dot{width:7px;height:7px;border-radius:50%;background:#39ff8e;
    box-shadow:0 0 6px #39ff8e;flex:none;}
  .mf-item .dot.off{background:#3a4660;box-shadow:none;}
  .mf-item .cs{font-weight:600;letter-spacing:.05em;flex:1;}
  .mf-item .live{font-size:9px;letter-spacing:.2em;color:#39ff8e;}
  .mf-item .rm{color:var(--muted);font-size:12px;padding:2px 4px;}
  .mf-item .rm:hover{color:#ff7d7d;}
  .auth-overlay{
    position:absolute;inset:0;z-index:30;display:none;
    align-items:center;justify-content:center;background:rgba(4,6,12,.55);
    backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  }
  .auth-card{
    position:relative;width:300px;padding:22px;border-radius:14px;
    background:var(--panel);border:1px solid var(--border);
  }
  .auth-card h2{font-size:16px;letter-spacing:.04em;margin-bottom:4px;}
  .auth-card .sub{font-size:11px;color:var(--muted);margin-bottom:16px;}
  .auth-card input{
    width:100%;margin-bottom:10px;padding:10px 12px;border-radius:9px;
    background:rgba(8,12,22,.7);border:1px solid var(--border);color:var(--text);
    font-size:13px;outline:none;
  }
  .auth-card input:focus{border-color:rgba(120,180,255,.5);}
  .auth-error{font-size:11px;color:#ff9d9d;min-height:15px;margin-bottom:8px;line-height:1.4;}
  .auth-primary{
    width:100%;padding:10px;border-radius:9px;border:none;cursor:pointer;
    background:var(--accent);color:#04121d;font-size:13px;font-weight:700;
  }
  .auth-primary:hover{filter:brightness(1.1);}
  .auth-alt{font-size:11px;color:var(--muted);margin-top:12px;text-align:center;}
  .auth-alt a{color:var(--accent);cursor:pointer;text-decoration:none;}
  .auth-close{position:absolute;top:10px;right:12px;background:none;border:none;
    color:var(--muted);font-size:14px;cursor:pointer;}
  .auth-close:hover{color:var(--text);}

  #loader{
    position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:14px;background:var(--bg);
    transition:opacity .6s;
  }
  #loader .ring{
    width:44px;height:44px;border-radius:50%;
    border:2px solid var(--border);border-top-color:var(--accent);
    animation:spin 1s linear infinite;
  }
  #loader span{font-size:11px;letter-spacing:.3em;color:var(--muted);text-transform:uppercase;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ---------- Premium polish ----------
     Same dark aesthetic, finer details: neutral hairline borders, soft
     layered shadows, steady tabular numerals, and gentle micro-motion. */
  html,body{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  .brand,.controls button,.hint,.panel,.mf-toggle,.mf-panel,.auth-card,.search,.map-toggle{
    border-color:rgba(255,255,255,.11);
    /* Stronger lit-from-above convex surface */
    background-image:linear-gradient(180deg,
      rgba(255,255,255,.10),rgba(255,255,255,.02) 34%,
      rgba(0,0,0,.07) 80%,rgba(0,0,0,.20));
    /* Double bevel + tight contact + deep ambient for a solid raised slab */
    box-shadow:0 1px 0 rgba(255,255,255,.20) inset,
               0 -1.5px 1px rgba(0,0,0,.36) inset,
               0 1px 1px rgba(0,0,0,.30),
               0 4px 6px -1px rgba(0,0,0,.42),
               0 14px 26px -8px rgba(0,0,0,.58),
               0 34px 64px -20px rgba(0,0,0,.78);
    backdrop-filter:blur(20px) saturate(145%);
    -webkit-backdrop-filter:blur(20px) saturate(145%);
  }
  /* Crisp specular highlight riding the top edge (neutral white).
     The other targets are already position:absolute; only the in-flow
     controls buttons need a positioning context for the pseudo-element. */
  .controls button{position:relative;}
  .brand::before,.panel::before,.mf-panel::before,.mf-toggle::before,.controls button::before{
    content:"";position:absolute;left:10%;right:10%;top:0;height:1px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);
    pointer-events:none;
  }
  .panel-callsign{letter-spacing:.02em;}
  .panel-grid{row-gap:14px;}
  .panel-grid span{font-size:9.5px;letter-spacing:.2em;margin-bottom:3px;opacity:.9;}
  .panel-grid b{font-variant-numeric:tabular-nums;letter-spacing:.01em;}
  .panel-head,.panel-photo,.panel-route,.mf-head{border-color:rgba(255,255,255,.07);}
  .panel-photo img{filter:saturate(1.05);}
  .panel-photo a{backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    background:rgba(10,14,22,.55);}
  .controls button,.mf-toggle{
    transition:background .2s,border-color .2s,transform .18s cubic-bezier(.2,.7,.3,1.4),
      box-shadow .2s;
  }
  .controls button:hover,.mf-toggle:hover{
    transform:translateY(-2px);
    box-shadow:0 1px 0 rgba(255,255,255,.16) inset,
               0 -1px 0 rgba(0,0,0,.30) inset,
               0 4px 6px rgba(0,0,0,.35),
               0 16px 30px -8px rgba(0,0,0,.55),
               0 38px 70px -18px rgba(0,0,0,.75);
  }
  .controls button:active{transform:translateY(0) scale(.94);}
  .panel-head button{transition:color .15s,transform .15s;}
  .panel-head button:hover{transform:scale(1.12);}
  .mf-item{transition:background .15s;}
  .mf-list{scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.14) transparent;}
  .mf-list::-webkit-scrollbar{width:5px;}
  .mf-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:99px;}
  :is(button,a):focus-visible{outline:2px solid rgba(120,180,255,.6);outline-offset:2px;}

  /* Below 900px the centred bar would collide with the brand badge and
     My Flights — drop it to its own row instead. */
  @media (max-width:900px){
    .top-center{top:64px;left:12px;right:12px;transform:none;height:40px;}
    .search{flex:1;width:auto;}
    .map-toggle{width:150px;}
    .search-results{top:110px;left:12px;right:12px;transform:none;width:auto;}
  }

  @media (max-width:600px){
    .brand{top:12px;left:12px;padding:8px 12px 8px 10px;}
    .brand .name{font-size:15px;}
    .brand .tag{display:none;}
    .controls{right:12px;bottom:20px;}
    .controls button{width:38px;height:38px;}
    .hint{display:none;}
    .notice{top:auto;bottom:76px;right:12px;left:12px;max-width:none;}
    .mf-toggle{top:12px;right:12px;padding:8px 12px;}
    .mf-panel{top:64px;right:12px;left:auto;width:248px;}
  }
</style>
</head>
<body>

<div id="globe"></div>

<!-- Branding -->
<div class="brand" aria-label="AeroNav3D">
  <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <radialGradient id="brandSphere" cx="35%" cy="28%" r="85%">
        <stop offset="0%" stop-color="#28324b"/>
        <stop offset="55%" stop-color="#0b101e"/>
        <stop offset="100%" stop-color="#04060b"/>
      </radialGradient>
      <linearGradient id="brandArrowTop" x1="9" y1="21" x2="25" y2="9" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#8f9aab"/>
        <stop offset="55%" stop-color="#e8edf5"/>
        <stop offset="100%" stop-color="#ffffff"/>
      </linearGradient>

<script>
"use strict";

/* ================= CONFIGURATION =================
 * Google Maps Platform API key with the "Map Tiles API" enabled:
 * https://console.cloud.google.com/google/maps-apis
 * Without a key, the globe falls back to Cesium's bundled
 * Natural Earth II imagery (no extra dependencies).
 * ================================================= */
const GOOGLE_MAPS_API_KEY = "AIzaSyA-n1jGuFhWQGcBPJNXauBWGnATg8Wg42U";
const GOOGLE_MAP_TYPE = "satellite"; // "satellite" | "roadmap" | "terrain"
// "hybrid" draws place names/roads over the imagery; "satellite" is bare.
let mapMode = localStorage.getItem("mapMode") === "satellite" ? "satellite" : "hybrid";

/* Supabase backend (flight feed, trails, favorites) */
const SUPABASE_URL = "https://kotesjmkaoebjsoaxizb.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_hnbnVldylI_kwLQ-8b8F8w_7kzXhHvg";

const HOME_VIEW = {
  destination: Cesium.Cartesian3.fromDegrees(0, 18, 22_000_000),
  orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 }
};

/* ---------------- Viewer ---------------- */
const viewer = new Cesium.Viewer("globe", {
  baseLayer: false,
  baseLayerPicker: false,
  geocoder: false,
  homeButton: false,
  sceneModePicker: false,
  navigationHelpButton: false,
  animation: false,
  timeline: false,
  fullscreenButton: false,
  infoBox: false,
  selectionIndicator: false
});

const scene = viewer.scene;
scene.globe.baseColor = Cesium.Color.fromCssColorString("#0b1226");
scene.globe.enableLighting = false;
scene.globe.showGroundAtmosphere = true;
scene.skyAtmosphere.show = true;
scene.moon.show = false;
scene.fog.enabled = true;
scene.screenSpaceCameraController.minimumZoomDistance = 250;
scene.screenSpaceCameraController.maximumZoomDistance = 40_000_000;
viewer.camera.setView(HOME_VIEW);

/* ---------------- Day/night lighting ---------------- */
// Shade the night side using the real sun position (clock runs at real time)
scene.globe.enableLighting = true;
scene.globe.dynamicAtmosphereLighting = true;
// Lighting is needed for the day/night imagery blend, but its diffuse term
// would darken the night side to ~30%, crushing the Black Marble lights.
// Full ambient keeps imagery at full brightness on both sides; day vs night
// still differs because the imagery itself swaps at the terminator.
scene.globe.vertexShadowDarkness = 1.0;
viewer.clock.shouldAnimate = true;

// NASA Black Marble (VIIRS) city lights, shown only on the night side of
// the terminator via the layer's day/night alpha blending.
function addNightLights() {
  const layer = viewer.imageryLayers.addImageryProvider(
    new Cesium.UrlTemplateImageryProvider({
      url: "https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/VIIRS_Black_Marble/default/2016-01-01/GoogleMapsCompatible_Level8/{z}/{y}/{x}.png",
      tilingScheme: new Cesium.WebMercatorTilingScheme(),
      maximumLevel: 8,
      credit: new Cesium.Credit("Night lights: NASA GIBS / VIIRS Black Marble")
    })
  );
  layer.dayAlpha = 0.0;   // invisible in daylight
  layer.nightAlpha = 1.0; // full Black Marble on the night side
  // Boost the lights so they stay visible at global zoom, where low-level
  // tiles average city glow down to dim pixels. Gamma < 1 lifts dim pixels
  // disproportionately; brightness scales everything up on top of that.
  layer.gamma = 0.5;
  layer.brightness = 1.6;
  layer.saturation = 1.2;
}

/* ---------------- Google Maps base layer ---------------- */
async function loadGoogleBaseLayer() {
  // Map Tiles API: create a session, then request 2D tiles with it.
  const res = await fetch(
    "https://tile.googleapis.com/v1/createSession?key=" + encodeURIComponent(GOOGLE_MAPS_API_KEY),
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        mapType: GOOGLE_MAP_TYPE,
        language: "en-US",
        region: "US",
        // Hybrid: draw place names and roads over the satellite imagery
        ...(mapMode === "hybrid" ? { layerTypes: ["layerRoadmap"] } : {})
      })
    }
  );
  if (!res.ok) throw new Error("createSession failed (" + res.status + ")");
  const { session } = await res.json();

  const provider = new Cesium.UrlTemplateImageryProvider({
    url: "https://tile.googleapis.com/v1/2dtiles/{z}/{x}/{y}"
       + "?session=" + encodeURIComponent(session)
       + "&key=" + encodeURIComponent(GOOGLE_MAPS_API_KEY),
    tilingScheme: new Cesium.WebMercatorTilingScheme(),
    maximumLevel: 22,
    credit: new Cesium.Credit("Map data © Google")
  });
  viewer.imageryLayers.addImageryProvider(provider);
}

// Keyless satellite fallback: Esri World Imagery (free with attribution).
// Used automatically whenever Google imagery is unavailable.
async function loadEsriLayer() {
  const url = "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}";
  const test = await fetch(url.replace("{z}/{y}/{x}", "0/0/0"));
  if (!test.ok) throw new Error("Esri tiles unreachable (" + test.status + ")");
  const provider = new Cesium.UrlTemplateImageryProvider({
    url,
    tilingScheme: new Cesium.WebMercatorTilingScheme(),
    maximumLevel: 19,
    credit: new Cesium.Credit("Imagery © Esri, Maxar, Earthstar Geographics")
  });
  viewer.imageryLayers.addImageryProvider(provider);
  // Hybrid labels (place names, boundaries, roads) over the imagery,
  // matching the Google layer's layerRoadmap overlay.
  if (mapMode === "hybrid") {
    viewer.imageryLayers.addImageryProvider(new Cesium.UrlTemplateImageryProvider({
      url: "https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}",
      tilingScheme: new Cesium.WebMercatorTilingScheme(),
      maximumLevel: 19,
      credit: new Cesium.Credit("Labels © Esri")
    }));
  }
}

// Last-resort imagery shipped inside the Cesium build itself (no extra CDN).
async function loadFallbackLayer() {
  const provider = await Cesium.TileMapServiceImageryProvider.fromUrl(
    Cesium.buildModuleUrl("Assets/Textures/NaturalEarthII")
  );
  viewer.imageryLayers.addImageryProvider(provider);
}

function showNotice(html) {
  const el = document.getElementById("notice");
  el.innerHTML = html;
  el.style.display = "block";
}

(async function initImagery() {
  const keyMissing = !GOOGLE_MAPS_API_KEY || GOOGLE_MAPS_API_KEY === "YOUR_GOOGLE_MAPS_API_KEY";
  try {
    if (keyMissing) throw new Error("no Google Maps key configured");
    await loadGoogleBaseLayer();
  } catch (err) {
    // Google unavailable (missing/revoked key, quota, outage) — switch to
    // keyless Esri satellite imagery. Visitors see no notice; the look is
    // nearly identical.
    console.warn("Google imagery unavailable (" + err.message + ") — using Esri World Imagery.");
    try {
      await loadEsriLayer();
    } catch (esriErr) {
      console.error("Esri imagery failed too:", esriErr);
      await loadFallbackLayer();
      showNotice("<strong>Satellite imagery unavailable.</strong><br>Showing basic map imagery — the site still works.");
    }
  }
  addNightLights(); // added after the base layer so it renders on top
  hideLoader();
})();

/* ---------------- Loader / hint ---------------- */
function hideLoader() {
  const loader = document.getElementById("loader");
  loader.style.opacity = "0";
  setTimeout(() => loader.remove(), 650);

  const hint = document.getElementById("hint");
  setTimeout(() => { hint.style.opacity = "0"; }, 6000);
}

/* ==================== LIVE FLIGHTS (Supabase) =====================
 * The flights Edge Function proxies public ADS-B aggregators with
 * failover and a shared cache, and records position snapshots for
 * the flight-trail feature. See supabase/functions/flights/index.ts.
 * ================================================================== */
const FLIGHT_DATA_URL = SUPABASE_URL + "/functions/v1/flights";
// Emergency fallback if the Supabase function is ever unreachable: the
// original Cloudflare Worker proxy. Leave "" to disable. It must accept
// the same ?circle=lat,lon,radius query.
const FLIGHT_PROXY_FALLBACK = "https://aeronav3d.blazedude12.workers.dev/flights";
const FLIGHT_POLL_MS = 6000;
const FLIGHT_RADIUS_NM = 250;   // re-api circle query maximum
const KNOTS_TO_MS = 0.514444;
const FT_TO_M = 0.3048;

const PLANE_SELECTED = Cesium.Color.fromCssColorString("#4cc3ff");

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ----- Flight trail: altitude-coloured recent path (FR24-style) -----
 * Each vertex is tinted by the plane's altitude there — yellow near the
 * ground, through green and cyan, to deep blue at cruise — so climbs and
 * descents read as a smooth gradient along the line. */
const TRAIL_GAP_MS = 5 * 60 * 1000;  // data gaps longer than this break the line
let trailPrimitives = [];            // static history segments
let livePrimitive = null;            // rebuilt as the live segment grows
let trailPositions = [];             // live segment; grows as new polls arrive
let trailAlts = [];                  // matching altitudes (ft) per position
let trailHex = null;

function altitudeColor(altFt) {
  const t = Math.min(Math.max(altFt || 0, 0), 38000) / 38000;
  // hue sweeps 55° (yellow) → 240° (blue) with altitude
  return Cesium.Color.fromHsl((55 + t * 185) / 360, 0.9, 0.55, 0.95);
}

// Densify the raw 6–30 s position fixes with a Catmull-Rom spline so turns
// render as smooth curves instead of polyline corners (FR24-style). The
// curve still passes through every real data point.
function smoothTrail(positions, altsFt) {
  if (positions.length < 3) return { positions, altsFt };
  const spline = new Cesium.CatmullRomSpline({
    times: positions.map((_, i) => i),
    points: positions
  });
  const SUB = 8;
  const outPos = [], outAlt = [];
  for (let i = 0; i < positions.length - 1; i++) {
    for (let s = 0; s < SUB; s++) {
      const f = s / SUB;
      outPos.push(spline.evaluate(i + f));
      outAlt.push(altsFt[i] * (1 - f) + altsFt[i + 1] * f);
    }
  }
  outPos.push(positions[positions.length - 1]);
  outAlt.push(altsFt[altsFt.length - 1]);
  return { positions: outPos, altsFt: outAlt };
}

function makeTrailPrimitive(rawPositions, rawAltsFt) {
  const { positions, altsFt } = smoothTrail(rawPositions, rawAltsFt);
  return viewer.scene.primitives.add(new Cesium.Primitive({
    geometryInstances: new Cesium.GeometryInstance({
      geometry: new Cesium.PolylineGeometry({
        positions,
        width: 3,
        colors: altsFt.map(altitudeColor),
        colorsPerVertex: true,
        vertexFormat: Cesium.PolylineColorAppearance.VERTEX_FORMAT
      })
    }),
    appearance: new Cesium.PolylineColorAppearance(),
    asynchronous: false
  }));
}

function clearTrail() {
  trailPrimitives.forEach((p) => viewer.scene.primitives.remove(p));
  if (livePrimitive) viewer.scene.primitives.remove(livePrimitive);
  trailPrimitives = [];
  livePrimitive = null;
  trailPositions = [];
  trailAlts = [];
  trailHex = null;
}

function rebuildLiveTrail() {
  if (livePrimitive) viewer.scene.primitives.remove(livePrimitive);
  livePrimitive = trailPositions.length > 1
    ? makeTrailPrimitive(trailPositions, trailAlts)
    : null;
}

async function showTrail(hex) {
  clearTrail();
  trailHex = hex;
  let history = [];
  try {
    const since = new Date(Date.now() - 3600 * 1000).toISOString();
    const { data, error } = await sb
      .from("flight_positions")
      .select("ts,lat,lon,alt_ft")
      .eq("hex", hex)
      .gte("ts", since)
      .order("ts");
    if (error) throw error;
    history = data || [];
  } catch (err) {
    console.warn("Trail history unavailable:", err.message || err);
  }
  if (trailHex !== hex) return; // selection changed while loading

  // Static segments for history, split at long gaps; the last segment
  // becomes the live one and keeps growing while the plane is selected.
  let seg = [], alts = [];
  let prevTs = 0;
  for (const p of history) {
    const t = Date.parse(p.ts);
    if (seg.length && t - prevTs > TRAIL_GAP_MS) {
      if (seg.length > 1) trailPrimitives.push(makeTrailPrimitive(seg, alts));
      seg = []; alts = [];
    }
    seg.push(Cesium.Cartesian3.fromDegrees(p.lon, p.lat, (p.alt_ft || 0) * FT_TO_M));
    alts.push(p.alt_ft || 0);
    prevTs = t;
  }
  trailPositions = seg;
  trailAlts = alts;
  rebuildLiveTrail();
}

function extendTrail(ac) {
  if (!trailHex || ac.hex !== trailHex) return;
  trailPositions.push(
    Cesium.Cartesian3.fromDegrees(ac.lon, ac.lat, flightAltitudeMeters(ac))
  );
  trailAlts.push(typeof ac.alt_baro === "number" ? ac.alt_baro : 0);
  rebuildLiveTrail();
}

/* ----- Departure/arrival route (FR24-style strip under the photo) -----
 * ADS-B doesn't broadcast flight plans, so the route comes from community
 * routeset databases keyed by callsign: the same-origin /routes Worker
 * proxy (cached 30 min) first, then adsb.im directly. Callsigns without
 * standing data (private/GA, cargo repositioning, military) stay unknown. */
const fpRoute = document.getElementById("fpRoute");
const ROUTE_ENDPOINTS = [
  "/routes",
  FLIGHT_PROXY_FALLBACK.replace(/\/flights$/, "/routes"),
  "https://adsb.im/api/0/routeset"
];
const routeCache = new Map(); // callsign -> {airports, plausible} | null
let routeHex = null;          // aircraft whose route is displayed
let routeMarkers = [];        // departure/destination airport entities
let destLine = null;          // dashed great circle: aircraft -> destination

function clearRouteDisplay() {
  routeMarkers.forEach((e) => viewer.entities.remove(e));
  routeMarkers = [];
  if (destLine) { viewer.entities.remove(destLine); destLine = null; }
  fpRoute.style.display = "none";
  fpRoute.innerHTML = "";
  routeHex = null;
}

function routeNote(text) {
  fpRoute.innerHTML = `<div class="route-note">${text}</div>`;
  fpRoute.style.display = "block";
}

async function lookupRoute(callsign, lat, lng) {
  const body = JSON.stringify({ planes: [{ callsign, lat, lng }] });
  const tried = new Set();
  for (const ep of ROUTE_ENDPOINTS) {
    const abs = new URL(ep, location.href).href; // same-origin /routes can duplicate the Worker URL
    if (tried.has(abs)) continue;
    tried.add(abs);
    try {
      const res = await fetch(abs, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body
      });
      if (!res.ok) continue;
      const arr = await res.json();
      if (Array.isArray(arr) && arr[0] && Array.isArray(arr[0]._airports)) {
        return { airports: arr[0]._airports, plausible: arr[0].plausible !== false };
      }
    } catch (e) { /* endpoint down — try the next one */ }
  }
  return null;
}

async function showRoute(hex) {
  clearRouteDisplay();
  routeHex = hex;
  const f = flights.get(hex);
  if (!f || !f.data) return;
  const callsign = (f.data.flight || "").trim();
  if (!callsign) { routeNote("Route unknown — this aircraft broadcasts no callsign"); return; }
  let route = routeCache.get(callsign);
  if (route === undefined) {
    routeNote("Looking up route…");
    route = await lookupRoute(callsign, f.data.lat, f.data.lon);
    if (routeHex !== hex) return; // selection changed while loading
    routeCache.set(callsign, route);
  }
  if (!route || route.airports.length < 2) {
    routeNote("Route unknown — no flight-plan data for this callsign");
    return;
  }
  const dep = route.airports[0];
  const dest = route.airports[route.airports.length - 1];
  const city = (ap) => (ap.location || ap.name || "").split(",")[0];
  fpRoute.innerHTML =
    '<div class="route-strip">' +
      `<div class="route-ap"><b>${dep.iata || dep.icao}</b><span>${city(dep)}</span></div>` +
      '<div class="route-mid" aria-hidden="true">' +
        '<svg width="17" height="17" viewBox="0 0 24 24" fill="#0b1226">' +
        '<path d="M21.5 15.5v-2l-8.5-5V3.25a1.25 1.25 0 1 0-2.5 0V8.5l-8.5 5v2l8.5-2.5v5.2l-2.3 1.55v1.5L12 20l3.8 1.25v-1.5L13.5 18.2V13l8 2.5Z"/></svg>' +
      "</div>" +
      `<div class="route-ap"><b>${dest.iata || dest.icao}</b><span>${city(dest)}</span></div>` +
    "</div>" +
    (route.plausible ? "" : '<div class="route-note">Route on file may not match this flight</div>');
  fpRoute.style.display = "block";
  addRouteVisuals(hex, dep, dest);
}

// Airport markers + a dashed great circle from the live aircraft position
// to the destination (matches the search feature's route-arc styling).
function addRouteVisuals(hex, dep, dest) {
  for (const ap of [dep, dest]) {
    if (typeof ap.lat !== "number" || typeof ap.lon !== "number") continue;
    routeMarkers.push(viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(ap.lon, ap.lat),
      point: {
        pixelSize: 7,
        color: Cesium.Color.fromCssColorString("#4cc3ff"),
        outlineColor: Cesium.Color.WHITE,
        outlineWidth: 1.5,
        disableDepthTestDistance: Number.POSITIVE_INFINITY
      },
      label: {
        text: ap.iata || ap.icao,
        font: "600 11px system-ui",
        fillColor: Cesium.Color.WHITE,
        showBackground: true,
        backgroundColor: new Cesium.Color(0.05, 0.07, 0.12, 0.8),
        backgroundPadding: new Cesium.Cartesian2(6, 4),
        pixelOffset: new Cesium.Cartesian2(0, -14),
        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
        disableDepthTestDistance: Number.POSITIVE_INFINITY
      }
    }));
  }
  if (typeof dest.lat !== "number" || typeof dest.lon !== "number") return;
  const destPos = Cesium.Cartesian3.fromDegrees(dest.lon, dest.lat);
  destLine = viewer.entities.add({
    polyline: {
      positions: new Cesium.CallbackProperty(() => {
        const f = flights.get(hex);
        if (!f || !f.data) return [];
        return [flightPosition(f.data, (Date.now() - f.fetchedAt) / 1000), destPos];
      }, false),
      width: 2.5,
      material: new Cesium.PolylineDashMaterialProperty({
        color: Cesium.Color.fromCssColorString("#4cc3ff").withAlpha(.9),
        dashLength: 14, dashPattern: 7
      })
    }
  });
}

// Icons are drawn in white and tinted per class via billboard.color.
// All glyphs point up (= track 0 / north).
function drawIcon(draw) {
  const c = document.createElement("canvas");
  c.width = 48; c.height = 48;
  const x = c.getContext("2d");
  x.translate(24, 24);
  x.fillStyle = "#ffffff";
  x.strokeStyle = "rgba(8,12,22,.7)";
  x.lineWidth = 2;
  draw(x);
  return c;
}

// Classify from the ADS-B emitter category, falling back to type codes.
// A7 = rotorcraft, A1/A2 = light/small aircraft, A3+ = airliners.
const HELI_TYPES = /^(R22|R44|R66|EC[0-9]|AS[35]|AW[0-9]|A109|A139|B06|B407|B412|B429|B505|S76|S92|H60|H125|H130|H135|H145|H160|H175|UH|MD5|MI[0-9]|KA[0-9])/;
const SMALL_TYPES = /^(C1[0-9]{2}|C2[0-9]{2}|P28|PA[0-9]|SR2|DA[24]|BE[359]|M20|DR4|RV[0-9]|GLAS|LNC|AA5|BL8|CH7|J3|SF50)/;
function classifyAircraft(ac) {
  const cat = ac.category || "";
  const t = (ac.t || "").toUpperCase();
  if (cat === "A7" || HELI_TYPES.test(t)) return "heli";
  if (cat === "A1" || cat === "A2" || SMALL_TYPES.test(t)) return "small";
  return "jet";
}

const planeBillboards = scene.primitives.add(new Cesium.BillboardCollection({ scene }));
const flights = new Map(); // hex -> { data, billboard, fetchedAt }
let selectedHex = null;
let flightsFailedOnce = false;
let flightsEverLoaded = false;
let flightEndpoint = FLIGHT_DATA_URL;

function flightAltitudeMeters(ac) {
  return typeof ac.alt_baro === "number" ? Math.max(ac.alt_baro, 0) * FT_TO_M : 0;
}

// Dead-reckoned position dt seconds after the last report
function flightPosition(ac, dt) {
  const gs = typeof ac.gs === "number" ? ac.gs * KNOTS_TO_MS : 0;
  const trk = Cesium.Math.toRadians(typeof ac.track === "number" ? ac.track : 0);
  const d = gs * dt;
  const lat = ac.lat + (d * Math.cos(trk)) / 111320;
  const lon = ac.lon + (d * Math.sin(trk)) / (111320 * Math.cos(Cesium.Math.toRadians(ac.lat)) || 1);
  return Cesium.Cartesian3.fromDegrees(lon, lat, flightAltitudeMeters(ac));
}

async function pollFlights() {
  if (document.hidden) return;
  const cam = viewer.camera.positionCartographic;
  const lat = Cesium.Math.toDegrees(cam.latitude).toFixed(3);
  const lon = Cesium.Math.toDegrees(cam.longitude).toFixed(3);
  let json;
  try {
    const res = await fetch(`${flightEndpoint}?circle=${lat},${lon},${FLIGHT_RADIUS_NM}`);
    if (!res.ok) throw new Error("HTTP " + res.status);
    json = await res.json();
    if (json.error) throw new Error(json.error);
  } catch (err) {
    // No local proxy (e.g. deployed on GitHub Pages)? Switch to the public
    // Worker fallback once and retry; if that fails too, show the notice.
    if (flightEndpoint === FLIGHT_DATA_URL && FLIGHT_PROXY_FALLBACK) {
      flightEndpoint = FLIGHT_PROXY_FALLBACK;
      return pollFlights();
    }
    // Ignore transient failures (e.g. upstream 429s) once data has flowed
    if (!flightsFailedOnce && !flightsEverLoaded) {
      flightsFailedOnce = true;
      console.warn("Flight data unavailable:", err.message);
      showNotice("<strong>Live flights unavailable.</strong><br>Retrying — the flight data sources may be busy.");
    }
    return;
  }
  if (flightsFailedOnce) {
    // Data is flowing now — clear the earlier warning
    document.getElementById("notice").style.display = "none";
    flightsFailedOnce = false;
  }
  flightsEverLoaded = true;

  const now = Date.now();
  const seen = new Set();
  // re-api names the list "aircraft"; the public api.adsb.lol names it "ac"
  for (const ac of json.aircraft || json.ac || []) {
    if (typeof ac.lat !== "number" || typeof ac.lon !== "number") continue;
    seen.add(ac.hex);
    const klass = classifyAircraft(ac);
    let f = flights.get(ac.hex);
    if (!f) {
      const ic = ICONS[klass];
      f = {
        klass,
        billboard: planeBillboards.add({
          image: ic.image,
          id: "plane:" + ac.hex,
          width: ic.size, height: ic.size,
          color: ic.color,
          scaleByDistance: new Cesium.NearFarScalar(5e5, 1.0, 1.5e7, 0.35)
        })
      };
      flights.set(ac.hex, f);
    } else if (f.klass !== klass) {
      // type/category can arrive a few messages later — reclassify in place
      const ic = ICONS[klass];
      f.klass = klass;
      f.billboard.image = ic.image;
      f.billboard.width = ic.size;
      f.billboard.height = ic.size;
      if (selectedHex !== ac.hex) f.billboard.color = ic.color;
    }
    f.data = ac;
    f.fetchedAt = now;
    extendTrail(ac);
  }
  // Drop aircraft that left the query circle or went silent
  for (const [hex, f] of flights) {
    if (!seen.has(hex)) {
      planeBillboards.remove(f.billboard);
      flights.delete(hex);
      if (selectedHex === hex) closeFlightPanel();
    }
  }
  applyAirlineFilter();
  document.getElementById("brandTag").textContent =
    flights.size ? `Global Navigation · ${flights.size} live` : "Global Navigation";
  if (selectedHex && flights.has(selectedHex)) updateFlightPanel(flights.get(selectedHex).data);
  if (mfPanel.style.display === "block") renderMyFlights();
}

// Smooth motion between polls: advance every frame along track at ground speed
scene.preRender.addEventListener(() => {
  if (!flights.size) return;
  const now = Date.now();
  const heading = viewer.camera.heading;
  flights.forEach((f) => {
    if (!f.data) return;
    f.billboard.position = flightPosition(f.data, (now - f.fetchedAt) / 1000);
    f.billboard.rotation = heading - Cesium.Math.toRadians(typeof f.data.track === "number" ? f.data.track : 0);
  });
});

/* Aircraft photo carousel. Two free sources are merged per airframe:
   Planespotters.net (public API, one curated photo — credit + link
   required) and Wikimedia Commons (per-registration categories, several
   CC-licensed photos at full quality). Cached per airframe. */
const fpPhotoWrap = document.getElementById("fpPhotoWrap");
const fpPhoto = document.getElementById("fpPhoto");
const fpPhotoCredit = document.getElementById("fpPhotoCredit");
const fpPhotoPrev = document.getElementById("fpPhotoPrev");
const fpPhotoNext = document.getElementById("fpPhotoNext");
const fpPhotoCount = document.getElementById("fpPhotoCount");
const photoCache = new Map(); // hex -> [{src, credit, link}]
let photoHex = null, photoList = [], photoIdx = 0;
function renderPanelPhoto() {
  if (!photoList.length) { fpPhotoWrap.style.display = "none"; return; }
  const p = photoList[photoIdx];
  fpPhoto.src = p.src;
  fpPhotoCredit.textContent = p.credit;
  fpPhotoCredit.href = p.link;
  const multi = photoList.length > 1;
  fpPhotoCount.textContent = `${photoIdx + 1} / ${photoList.length}`;
  fpPhotoPrev.style.display = fpPhotoNext.style.display = multi ? "flex" : "none";
  fpPhotoCount.style.display = multi ? "block" : "none";
  fpPhotoWrap.style.display = "block";
}
async function updateAircraftPhoto(ac) {
  const hex = (ac.hex || "").replace(/[^0-9a-f]/gi, ""); // strip TIS-B "~" prefix
  if (hex === photoHex) return;
  photoHex = hex;
  photoList = []; photoIdx = 0;
  fpPhotoWrap.style.display = "none";
  if (!hex) return;
  if (!photoCache.has(hex)) {
    const reg = (ac.r || "").trim();
    // Registrations get reused across airframes (Singapore's 9V-SM* flew on
    // 747s before today's A350s), so photos older than this airframe's build
    // year are someone else's plane — filter them out when the year is known.
    let builtYear = null;
    try {
      const shard = await fetch(`db/ac/${hex.slice(0, 2)}.json`)
        .then(r => r.ok ? r.json() : null);
      builtYear = parseInt(shard?.[hex.slice(2)]?.[1], 10) || null;
    } catch (e) {}
    const common = "prop=imageinfo&iiprop=url|mime|extmetadata" +
      "&iiurlwidth=700&format=json&origin=*";
    const api = "https://commons.wikimedia.org/w/api.php?action=query";
    const catUrl = `${api}&generator=categorymembers` +
      `&gcmtitle=${encodeURIComponent(`Category:${reg} (aircraft)`)}` +
      `&gcmtype=file&gcmlimit=10&${common}`;
    const searchUrl = `${api}&generator=search` +
      `&gsrsearch=${encodeURIComponent(`intitle:"${reg}"`)}` +
      `&gsrnamespace=6&gsrlimit=10&${common}`;
    const [ps, cat, srch] = await Promise.allSettled([
      fetch(`https://api.planespotters.net/pub/photos/hex/${hex}`).then(r => r.json()),
      reg ? fetch(catUrl).then(r => r.json()) : Promise.reject(new Error("no reg")),
      reg ? fetch(searchUrl).then(r => r.json()) : Promise.reject(new Error("no reg")),
    ]);
    const list = [];
    if (ps.status === "fulfilled")
      for (const p of ps.value?.photos || []) list.push({
        src: p.thumbnail_large?.src || p.thumbnail?.src,
        credit: `© ${p.photographer} · Planespotters.net`,
        link: p.link
      });
    const pages = {}; // merge category + search hits, deduped by page id
    for (const res of [cat, srch])
      if (res.status === "fulfilled")
        Object.assign(pages, res.value?.query?.pages || {});
    const strip = document.createElement("div");
    const commons = [];
    const regUp = reg.toUpperCase();
    for (const page of Object.values(pages)) {
      const ii = page.imageinfo?.[0];
      if (!ii?.thumburl || !/^image\/(jpeg|png)/.test(ii.mime || "")) continue;
      const md = ii.extmetadata || {};
      const dateStr = md.DateTimeOriginal?.value || md.DateTime?.value || "";
      const year = parseInt(/(19|20)\d\d/.exec(dateStr)?.[0], 10) || null;
      const regInTitle = regUp && (page.title || "").toUpperCase().includes(regUp);
      // A photo provably belongs to THIS airframe only if its date is at or
      // after the build year. When that check isn't possible (no build year
      // on file, or undated photo), require the registration in the filename
      // as the next-best signal and accept the residual reuse risk.
      if (year && builtYear) {
        if (year < builtYear) continue;
      } else if (!regInTitle) continue;
      strip.innerHTML = md.Artist?.value || "";
      const artist = strip.textContent.trim().slice(0, 32) || "Wikimedia contributor";
      commons.push({
        src: ii.thumburl,
        credit: `© ${artist} · Wikimedia Commons`,
        link: ii.descriptionurl || ii.url,
        year
      });
    }
    commons.sort((a, b) => (b.year || 0) - (a.year || 0)); // newest livery first
    // Photos of the current holder of a reused registration cluster recent;
    // anything a decade older than the newest shot is likely a predecessor.
    const newest = commons.find(p => p.year)?.year;
    list.push(...commons.filter(p => !newest || !p.year || newest - p.year <= 10));
    // Keep it tight: the curated Planespotters shot + the latest Commons photos
    photoCache.set(hex, list.filter(p => p.src).slice(0, 3));
    if (photoHex !== hex) return; // selection changed while loading
  }
  photoList = photoCache.get(hex).slice();
  photoIdx = 0;
  renderPanelPhoto();
}
fpPhotoPrev.addEventListener("click", () => {
  photoIdx = (photoIdx - 1 + photoList.length) % photoList.length;
  renderPanelPhoto();
});
fpPhotoNext.addEventListener("click", () => {
  photoIdx = (photoIdx + 1) % photoList.length;
  renderPanelPhoto();
});
fpPhoto.addEventListener("error", () => { // drop photos that fail to load
  photoList.splice(photoIdx, 1);

  renderPanelPhoto();
});
/* Aircraft details: MSN + build year come from local JSON shards under
   db/ac/ (trimmed from OpenSky's aircraft database, keyed by hex prefix);
   country of registration comes from the adsbdb.com public API. Both are
   cached per airframe so the 1 s refresher never re-requests. */
const metaCache = new Map(); // hex -> { msn, age, country } (nulls for unknown)
let metaHex = null;
function setAircraftMetaText(meta) {
  document.getElementById("fpMsn").textContent = meta?.msn || "—";
  document.getElementById("fpAge").textContent = meta?.age || "—";
  document.getElementById("fpCountry").textContent = meta?.country || "—";
}
async function updateAircraftMeta(rawHex) {
  const hex = (rawHex || "").toLowerCase().replace(/[^0-9a-f]/g, "");
  if (hex === metaHex) return;
  metaHex = hex;
  setAircraftMetaText(null);
  if (hex.length !== 6) return;
  if (!metaCache.has(hex)) {
    const meta = { msn: null, age: null, country: null };
    const [shard, adsbdb] = await Promise.allSettled([
      fetch(`db/ac/${hex.slice(0, 2)}.json`).then(r => r.ok ? r.json() : null),
      fetch(`https://api.adsbdb.com/v0/aircraft/${hex}`).then(r => r.json()),
    ]);
    const rec = shard.status === "fulfilled" ? shard.value?.[hex.slice(2)] : null;
    if (rec) {
      meta.msn = rec[0] || null;
      const year = parseInt(rec[1], 10);
      if (year) meta.age = Math.max(0, new Date().getFullYear() - year) + " yrs";
    }
    if (adsbdb.status === "fulfilled") {
      meta.country = adsbdb.value?.response?.aircraft?.registered_owner_country_name || null;
    }
    metaCache.set(hex, meta);
    if (metaHex !== hex) return; // selection changed while loading
  }
  setAircraftMetaText(metaCache.get(hex));
}

function fmtAlt(ac, dtSec) {
  if (ac.alt_baro === "ground") return "GROUND";
  if (typeof ac.alt_baro !== "number") return "—";
  // Dead-reckon between data polls, like the plane icons do
  let alt = ac.alt_baro;
  if (dtSec && typeof ac.baro_rate === "number") alt += ac.baro_rate * (dtSec / 60);
  return (Math.round(alt / 25) * 25).toLocaleString() + " ft";
}
function updateFlightPanel(ac) {
  const callsign = (ac.flight || "").trim() || ac.hex.toUpperCase();
  updateAirlineLogo(callsign);

  updateAircraftMeta(ac.hex);
  const airline = airlineFor(callsign);
  const rec = flights.get(ac.hex);
  const dtSec = rec ? (Date.now() - rec.fetchedAt) / 1000 : 0;
  document.getElementById("fpCallsign").textContent = callsign;
  document.getElementById("fpSub").textContent =
    [airline && airline[1], ac.r, ac.t].filter(Boolean).join(" · ") || "—";
  document.getElementById("fpAlt").textContent = fmtAlt(ac, dtSec);
  document.getElementById("fpSpd").textContent = typeof ac.gs === "number" ? Math.round(ac.gs) + " kt" : "—";
  document.getElementById("fpTrk").textContent = typeof ac.track === "number" ? Math.round(ac.track) + "°" : "—";
  document.getElementById("fpVr").textContent = typeof ac.baro_rate === "number" ? ac.baro_rate + " ft/min" : "—";
}

/* Hover tooltip: callsign + airline logo above the plane, FR24-style */
const planeTip = document.getElementById("planeTip");
const planeTipLogo = document.getElementById("planeTipLogo");
const planeTipCs = document.getElementById("planeTipCs");
planeTipLogo.addEventListener("error", () => { planeTipLogo.style.display = "none"; });
let tipHex = null;
pickHandler.setInputAction((evt) => {
  const picked = scene.pick(evt.endPosition);
  const id = picked && typeof picked.id === "string" ? picked.id : null;
  if (id && id.startsWith("plane:")) {
    const hex = id.slice(6);
    const f = flights.get(hex);
    if (f) {
      if (tipHex !== hex) { // only rebuild content when the plane changes
        tipHex = hex;
        const cs = (f.data.flight || "").trim() || hex.toUpperCase();
        planeTipCs.textContent = cs;
        const al = airlineFor(cs);
        if (al) {
          planeTipLogo.src = `https://www.gstatic.com/flights/airline_logos/70px/${al[0]}.png`;
          planeTipLogo.style.display = "block";
        } else {
          planeTipLogo.style.display = "none";
          planeTipLogo.removeAttribute("src");
        }
      }
      planeTip.style.left = evt.endPosition.x + "px";
      planeTip.style.top = evt.endPosition.y + "px";
      planeTip.style.display = "flex";
      scene.canvas.style.cursor = "pointer";
      return;
    }
  }
  tipHex = null;
  planeTip.style.display = "none";
  scene.canvas.style.cursor = "";
}, Cesium.ScreenSpaceEventType.MOUSE_MOVE);

/* ----- Map style toggle: hybrid (labels) vs pure satellite ----- */
const mapToggle = document.getElementById("mapToggle");
const mtThumb = document.getElementById("mtThumb");
function reflectMapToggle() {
  mapToggle.querySelectorAll(".mt-opt").forEach((b) =>
    b.classList.toggle("active", b.dataset.mode === mapMode));
  mtThumb.style.transform = mapMode === "hybrid" ? "translateX(0)" : "translateX(100%)";
}
async function setMapMode(mode) {
  if (mode === mapMode) return;
  mapMode = mode;
  localStorage.setItem("mapMode", mode);
  reflectMapToggle();
  viewer.imageryLayers.removeAll();
  try {
    await loadGoogleBaseLayer();
  } catch (err) {
    try { await loadEsriLayer(); } catch (e) { await loadFallbackLayer(); }
  }
  addNightLights();
}
mapToggle.addEventListener("click", (e) => {
  const b = e.target.closest(".mt-opt");
  if (b) setMapMode(b.dataset.mode);
});
reflectMapToggle();

let airlineFilter = null; // { prefixes:Set<ICAO>, name }
function applyAirlineFilter() {
  for (const f of flights.values()) {
    const cs = (f.data.flight || "").trim();
    f.billboard.show = !airlineFilter ||
      airlineFilter.prefixes.has(/^[A-Z]{3}/.exec(cs)?.[0]);
  }
}
function setAirlineFilter(prefixes, name) {
  airlineFilter = { prefixes: new Set(prefixes), name };
  searchChip.textContent = `${name} ✕`;
  searchChip.style.display = "flex";
  applyAirlineFilter();
}
function clearAirlineFilter() {
  airlineFilter = null;
  searchChip.style.display = "none";
  applyAirlineFilter();
}
searchChip.addEventListener("click", clearAirlineFilter);

let routeEntity = null;
function showRouteArc(a, b) {
  if (routeEntity) viewer.entities.remove(routeEntity);
  routeEntity = viewer.entities.add({
    polyline: {
      positions: Cesium.Cartesian3.fromDegreesArray([a[5], a[4], b[5], b[4]]),
      width: 2.5,
      material: new Cesium.PolylineDashMaterialProperty({
        color: Cesium.Color.fromCssColorString("#4cc3ff").withAlpha(.9)
      })
    }
  });
  const west = Math.min(a[5], b[5]) - 6, east = Math.max(a[5], b[5]) + 6;
  const south = Math.min(a[4], b[4]) - 6, north = Math.max(a[4], b[4]) + 6;
  viewer.camera.flyTo({
    destination: Cesium.Rectangle.fromDegrees(west, Math.max(south, -89), east, Math.min(north, 89)),
    duration: 1.8
  });
}

function airportMatches(q) {
  const qn = q.trim().toUpperCase();
  if (qn.length < 3) return [];
  return AIRPORTS.filter(a =>
    a[0] === qn || a[1] === qn ||
    a[2].toUpperCase().includes(qn) || a[3].toUpperCase().includes(qn)
  ).slice(0, 5);
}
function airportExact(q) {
  const qn = q.trim().toUpperCase();
  return AIRPORTS.find(a => a[0] === qn || a[1] === qn) ||
    (qn.length >= 4 ? AIRPORTS.find(a =>
      a[2].toUpperCase().includes(qn) || a[3].toUpperCase().includes(qn)) : null);
}

function buildResults(q) {
  const qn = q.trim().toUpperCase();
  if (!qn) return null;
  const out = { qn, flights: [], airlines: [], airports: [], route: null, nearby: false };

  if ("NEARBY".startsWith(qn) && qn.length >= 4) out.nearby = true;

  // Route: "SEA-LAX", "SEA - LAX", city names either side
  const parts = qn.split(/\s*-\s*/);
  if (parts.length === 2 && parts[0] && parts[1]) {
    const a = airportExact(parts[0]), b = airportExact(parts[1]);
    if (a && b && a !== b) out.route = [a, b];
  }

  // IATA flight number -> ICAO callsign candidate (e.g. BA112 -> BAW112)
  let icaoCandidate = null;
  const fm = /^([A-Z0-9]{2})(\d{1,4}[A-Z]?)$/.exec(qn);
  if (fm && IATA_TO_ICAO[fm[1]]) icaoCandidate = IATA_TO_ICAO[fm[1]] + fm[2];

  // Live flights: callsign, converted flight number, or registration
  const qreg = qn.replace(/-/g, "");
  for (const [hex, f] of flights) {
    const cs = (f.data.flight || "").trim().toUpperCase();
    const reg = (f.data.r || "").toUpperCase().replace(/-/g, "");
    if ((cs && (cs.startsWith(qn) || (icaoCandidate && cs.startsWith(icaoCandidate)))) ||
        (reg && qreg.length >= 2 && reg.startsWith(qreg))) {
      out.flights.push([hex, f]);
      if (out.flights.length >= 8) break;
    }
  }

  // Airlines by name or IATA/ICAO code, deduped by name
  if (qn.length >= 2 && !out.route) {
    const seen = new Set();
    for (const [icao, [iata, name]] of Object.entries(AIRLINES)) {
      if (icao === qn || iata === qn || name.toUpperCase().includes(qn)) {
        if (seen.has(name)) continue;
        seen.add(name);
        const prefixes = Object.entries(AIRLINES)
          .filter(([, v]) => v[1] === name).map(([k]) => k);
        const live = [...flights.values()].filter(f =>
          prefixes.includes(/^[A-Z]{3}/.exec((f.data.flight || "").trim())?.[0])).length;
        out.airlines.push({ name, iata, prefixes, live });
        if (out.airlines.length >= 5) break;
      }
    }
  }

  if (!out.route) out.airports = airportMatches(q);
  return out;
}

function renderResults(r) {
  if (!r) { searchResults.style.display = "none"; return; }
  let html = "";
  const esc = s => s.replace(/[&<>"]/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c]));
  if (r.nearby) {
    html += `<button class="sr-item" data-act="nearby"><span class="glyph">◎</span>
      <span class="t">Nearby<small>Fly to your current location</small></span></button>`;
  }
  if (r.route) {
    const [a, b] = r.route;
    html += `<div class="sr-group">ROUTE</div>
      <button class="sr-item" data-act="route" data-a="${a[0]}" data-b="${b[0]}">
      <span class="glyph">⇢</span><span class="t">${a[0]} → ${b[0]}
      <small>${esc(a[3])} to ${esc(b[3])} · shows the route on the globe</small></span></button>`;
  }
  if (r.flights.length) {
    html += `<div class="sr-group">LIVE FLIGHTS</div>`;
    for (const [hex, f] of r.flights) {
      const cs = (f.data.flight || "").trim() || hex.toUpperCase();
      const al = airlineFor(cs);
      const logo = al ? `<img src="https://www.gstatic.com/flights/airline_logos/70px/${al[0]}.png" alt="">`
                      : `<span class="glyph">✈</span>`;
      const sub = [al && al[1], f.data.r, f.data.t].filter(Boolean).join(" · ");
      html += `<button class="sr-item" data-act="flight" data-hex="${hex}">${logo}
        <span class="t">${esc(cs)}<small>${esc(sub || "—")}</small></span>
        <span class="badge">LIVE</span></button>`;
    }
  }
  if (r.airlines.length) {
    html += `<div class="sr-group">AIRLINES</div>`;
    for (const a of r.airlines) {
      html += `<button class="sr-item" data-act="airline" data-prefixes="${a.prefixes.join(",")}" data-name="${esc(a.name)}">
        <img src="https://www.gstatic.com/flights/airline_logos/70px/${a.iata}.png" alt="">
        <span class="t">${esc(a.name)}<small>Filter the map to this airline</small></span>
        <span class="badge">${a.live} IN VIEW</span></button>`;
    }
  }
  if (r.global?.length) {
    html += `<div class="sr-group">WORLDWIDE</div>`;
    for (const ac of r.global) {
      const cs = (ac.flight || "").trim() || ac.hex.toUpperCase();
      const al = airlineFor(cs);
      const logo = al ? `<img src="https://www.gstatic.com/flights/airline_logos/70px/${al[0]}.png" alt="">`
                      : `<span class="glyph">✈</span>`;
      const sub = [al && al[1], ac.r, ac.t].filter(Boolean).join(" · ");
      html += `<button class="sr-item" data-act="gflight" data-hex="${ac.hex}">${logo}
        <span class="t">${esc(cs)}<small>${esc(sub || "—")}</small></span>
        <span class="badge">LIVE · GLOBAL</span></button>`;
    }
  }
  if (r.airports.length) {
    html += `<div class="sr-group">AIRPORTS</div>`;
    for (const a of r.airports) {
      html += `<button class="sr-item" data-act="airport" data-iata="${a[0]}">
        <span class="glyph">⌖</span><span class="t">${a[0]} · ${esc(a[2])}
        <small>${esc(a[3])} · ${a[1]}</small></span></button>`;
    }
  }
  if (r.pendingGlobal && !html) {
    html = `<div class="sr-empty">Searching worldwide…</div>`;
  } else if (r.pendingGlobal) {
    html += `<div class="sr-empty">Searching worldwide…</div>`;
  }
  if (!html) {
    if (r.flightInfo) {
      const i = r.flightInfo;
      html = `<div class="sr-empty"><strong>${esc(r.qn || "")}</strong>
        ${i.airline ? "· " + esc(i.airline) : ""}
        ${i.from && i.to ? `· ${i.from} → ${i.to}` : ""}<br>
        Not visible on ADS-B right now — it may not be airborne yet, or it's
        outside ground-receiver coverage (common over oceans and polar routes).</div>`;
    } else if (r.globalChecked) {
      html = `<div class="sr-empty">No live flight matches “${esc(r.qn || "")}” anywhere in the
        world right now — it's likely not airborne yet. ADS-B search only finds
        aircraft currently transmitting; try again closer to departure time.</div>`;
    } else {
      html = `<div class="sr-empty">No matches. Use an exact callsign or registration
        (e.g. “UAE93Q”, “N774SA”) to find any live flight worldwide, or try an
        airline (“Delta”), airport (“SEA”), route (“SEA-LAX”) or “nearby”.</div>`;
    }
  }
  searchResults.innerHTML = html;
  searchResults.style.display = "block";
}

function runSearchAction(el) {
  const act = el.dataset.act;
  if (act === "flight") {
    const f = flights.get(el.dataset.hex);
    if (f) {
      selectFlight(el.dataset.hex);
      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(
          f.data.lon, f.data.lat, Math.max(flightAltitudeMeters(f.data) * 2, 150000)),
        duration: 1.6
      });
    }
  } else if (act === "gflight") {
    const ac = globalHits.get(el.dataset.hex);
    if (ac) {
      const hex = el.dataset.hex;
      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(
          ac.lon, ac.lat, Math.max(flightAltitudeMeters(ac) * 2, 200000)),
        duration: 2.2,
        complete: () => {
          pollFlights(); // fetch the new area, then select once the plane arrives
          const t0 = Date.now();
          const iv = setInterval(() => {
            if (flights.has(hex)) { clearInterval(iv); selectFlight(hex); }
            else if (Date.now() - t0 > 12000) clearInterval(iv);
          }, 600);
        }
      });
    }
  } else if (act === "airline") {
    setAirlineFilter(el.dataset.prefixes.split(","), el.dataset.name);
  } else if (act === "airport") {
    const a = AIRPORTS.find(x => x[0] === el.dataset.iata);
    if (a) viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(a[5], a[4], 120000), duration: 1.6 });
  } else if (act === "route") {
    const a = AIRPORTS.find(x => x[0] === el.dataset.a);
    const b = AIRPORTS.find(x => x[0] === el.dataset.b);
    if (a && b) showRouteArc(a, b);
  } else if (act === "nearby") {
    navigator.geolocation?.getCurrentPosition(
      p => viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(
          p.coords.longitude, p.coords.latitude, 150000), duration: 1.6 }),
      () => showNotice("<strong>Location unavailable.</strong><br>Allow location access to use “nearby”.")
    );
  }
  searchResults.style.display = "none";
  searchInput.blur();
}

/* Worldwide flight lookup (exact callsign or registration) via the
   airplanes.live public API, so search isn't limited to the local feed
   around the camera. Cached briefly per query while typing. */
const globalHits = new Map();  // hex -> ac from the last worldwide lookup
const globalCache = new Map(); // query key -> { t, list }
async function globalLookup(qn, icaoCandidate) {
  const key = qn + "|" + (icaoCandidate || "");
  const hit = globalCache.get(key);
  if (hit && Date.now() - hit.t < 15000) return hit.list;
  const paths = new Set([`callsign/${qn}`, `reg/${qn}`]);
  if (icaoCandidate) paths.add(`callsign/${icaoCandidate}`);
  const settled = await Promise.allSettled([...paths].map(p =>
    fetch(`https://api.airplanes.live/v2/${p}`).then(r => r.json())));
  const byHex = new Map();
  for (const res of settled)
    if (res.status === "fulfilled")
      for (const ac of res.value?.ac || [])
        if (typeof ac.lat === "number" && typeof ac.lon === "number")
          byHex.set(ac.hex, ac);
  const list = [...byHex.values()].slice(0, 6);
  globalCache.set(key, { t: Date.now(), list });
  return list;
}

let searchSeq = 0;
async function runSearch(q) {
  const seq = ++searchSeq;
  const r = buildResults(q);
  const qn = (q || "").trim().toUpperCase();
  const eligible = r && /^[A-Z0-9-]{3,8}$/.test(qn) && !r.route;
  if (r) r.pendingGlobal = eligible;
  renderResults(r);
  if (!eligible) return;
  const fm = /^([A-Z0-9]{2})(\d{1,4}[A-Z]?)$/.exec(qn);
  const icaoCandidate = fm && IATA_TO_ICAO[fm[1]] ? IATA_TO_ICAO[fm[1]] + fm[2] : null;
  const globals = await globalLookup(qn, icaoCandidate);
  if (seq !== searchSeq) return; // query changed while fetching
  const localHexes = new Set(r.flights.map(([h]) => h));
  r.global = globals.filter(ac => !localHexes.has(ac.hex));
  for (const ac of r.global) globalHits.set(ac.hex, ac);
  r.pendingGlobal = false;
  r.globalChecked = true;
  // Nothing transmitting? Identify the flight via adsbdb so the empty
  // state can say what it is and why it may be invisible (coverage gaps
  // over oceans/polar routes, or not airborne yet).
  if (!r.global.length && !r.flights.length && /^[A-Z0-9]{4,8}$/.test(qn)) {
    const ck = "info|" + qn;
    let info = globalCache.get(ck);
    if (!info) {
      try {
        const fr = (await (await fetch(`https://api.adsbdb.com/v0/callsign/${qn}`)).json())
          .response?.flightroute;
        info = fr ? {
          airline: fr.airline?.name,
          from: fr.origin?.iata_code, to: fr.destination?.iata_code
        } : { none: true };
      } catch (e) { info = { none: true }; }
      globalCache.set(ck, info);
    }
    if (seq !== searchSeq) return;
    if (!info.none) r.flightInfo = info;
  }
  renderResults(r);
}

let searchDebounce = null;
searchInput.addEventListener("input", () => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => runSearch(searchInput.value), 150);
});
searchInput.addEventListener("focus", () => {
  if (searchInput.value.trim()) runSearch(searchInput.value);
});
searchInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    const first = searchResults.querySelector(".sr-item");
    if (first && searchResults.style.display === "block") runSearchAction(first);
  } else if (e.key === "Escape") {
    searchResults.style.display = "none";
    searchInput.value = "";
    if (routeEntity) { viewer.entities.remove(routeEntity); routeEntity = null; }
  }
});
searchResults.addEventListener("click", (e) => {
  const item = e.target.closest(".sr-item");
  if (item) runSearchAction(item);
});
document.addEventListener("click", (e) => {
  if (!e.target.closest(".search") && !e.target.closest(".search-results"))
    searchResults.style.display = "none";
});

pollFlights();
setInterval(pollFlights, FLIGHT_POLL_MS);
// Refresh promptly after the user pans somewhere new
let lastMovePoll = 0;
viewer.camera.moveEnd.addEventListener(() => {
  if (Date.now() - lastMovePoll > 2500) { lastMovePoll = Date.now(); pollFlights(); }
});

/* ----- Favorites & sign-in ----- */
const favorites = new Map(); // hex -> { id, hex, callsign }
let session = null;
let authIsSignUp = false;

const mfPanel = document.getElementById("mfPanel");
const authOverlay = document.getElementById("authOverlay");

sb.auth.onAuthStateChange((_event, s) => {
  session = s;
  document.getElementById("mfAuthLink").textContent = s ? "Sign out" : "Sign in";
  refreshFavorites();
});

async function refreshFavorites() {
  favorites.clear();
  if (session) {
    const { data, error } = await sb.from("favorites").select("id,hex,callsign");
    if (error) console.warn("favorites load failed:", error.message);
    (data || []).forEach((f) => favorites.set(f.hex, f));
  }
  renderMyFlights();
  updateStar();
}

function updateStar() {
  const btn = document.getElementById("fpStar");
  const isFav = selectedHex && favorites.has(selectedHex);
  btn.textContent = isFav ? "★" : "☆";
  btn.classList.toggle("active", !!isFav);
}

async function toggleFavorite() {
  if (!selectedHex) return;
  if (!session) { openAuth(); return; }
  const existing = favorites.get(selectedHex);
  if (existing) {
    const { error } = await sb.from("favorites").delete().eq("id", existing.id);
    if (!error) favorites.delete(existing.hex);
    else console.warn("favorite remove failed:", error.message);
  } else {
    const f = flights.get(selectedHex);
    const callsign = (f && f.data && (f.data.flight || "").trim()) || selectedHex.toUpperCase();
    const { data, error } = await sb.from("favorites")
      .insert({ hex: selectedHex, callsign })
      .select("id,hex,callsign").single();
    if (!error && data) favorites.set(data.hex, data);
    else if (error) console.warn("favorite save failed:", error.message);
  }
  renderMyFlights();
  updateStar();
}

function renderMyFlights() {
  const list = document.getElementById("mfList");
  if (!session) {
    list.innerHTML = '<div class="mf-empty">Sign in to save flights and see when they\'re live on the globe.</div>';
    return;
  }
  if (!favorites.size) {
    list.innerHTML = '<div class="mf-empty">No saved flights yet. Click a plane, then tap the ☆ in its panel.</div>';
    return;
  }
  list.innerHTML = "";
  favorites.forEach((fav) => {
    const liveNow = flights.has(fav.hex);
    const item = document.createElement("button");
    item.className = "mf-item";
    item.innerHTML =
      '<span class="dot ' + (liveNow ? "" : "off") + '"></span>' +
      '<span class="cs"></span>' +
      (liveNow ? '<span class="live">LIVE</span>' : "") +
      '<span class="rm" title="Remove">✕</span>';
    item.querySelector(".cs").textContent = fav.callsign || fav.hex.toUpperCase();
    item.querySelector(".rm").addEventListener("click", async (e) => {
      e.stopPropagation();
      const { error } = await sb.from("favorites").delete().eq("id", fav.id);
      if (!error) { favorites.delete(fav.hex); renderMyFlights(); updateStar(); }
    });
    item.addEventListener("click", () => {
      const f = flights.get(fav.hex);
      if (!f || !f.data) return;
      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(
          f.data.lon, f.data.lat, flightAltitudeMeters(f.data) + 150_000),
        duration: 1.8
      });
    });
    list.appendChild(item);
  });
}

/* Sign-in card */
function openAuth() {
  authOverlay.style.display = "flex";
  document.getElementById("authError").textContent = "";
  document.getElementById("authEmail").focus();
}
function closeAuth() { authOverlay.style.display = "none"; }
function setAuthMode(signUp) {
  authIsSignUp = signUp;
  document.getElementById("authTitle").textContent = signUp ? "Create account" : "Sign in";
  document.getElementById("authSubmit").textContent = signUp ? "Create account" : "Sign in";
  document.getElementById("authAlt").innerHTML = signUp
    ? 'Have an account? <a id="authMode">Sign in</a>'
    : 'No account? <a id="authMode">Create one</a>';
  document.getElementById("authMode").addEventListener("click", () => setAuthMode(!authIsSignUp));
}
async function submitAuth() {
  const email = document.getElementById("authEmail").value.trim();
  const password = document.getElementById("authPass").value;
  const errEl = document.getElementById("authError");
  if (!email || password.length < 6) {
    errEl.textContent = "Enter your email and a password of at least 6 characters.";
    return;
  }
  errEl.textContent = "";
  const { data, error } = authIsSignUp
    ? await sb.auth.signUp({ email, password })
    : await sb.auth.signInWithPassword({ email, password });
  if (error) { errEl.textContent = error.message; return; }
  if (authIsSignUp && !data.session) {
    errEl.textContent = "Check your email to confirm your account, then sign in.";
    return;
  }
  closeAuth();
}

document.getElementById("fpStar").addEventListener("click", toggleFavorite);
document.getElementById("mfToggle").addEventListener("click", () => {
  const open = mfPanel.style.display === "block";
  mfPanel.style.display = open ? "none" : "block";
  document.getElementById("mfToggle").setAttribute("aria-expanded", String(!open));
  if (!open) renderMyFlights();
});
document.getElementById("mfAuthLink").addEventListener("click", async () => {
  if (session) await sb.auth.signOut();
  else openAuth();
});
document.getElementById("authClose").addEventListener("click", closeAuth);
document.getElementById("authSubmit").addEventListener("click", submitAuth);
document.getElementById("authPass").addEventListener("keydown", (e) => {
  if (e.key === "Enter") submitAuth();
});
setAuthMode(false);
refreshFavorites();

/* ---------------- Controls ---------------- */
function cameraHeight() {
  return viewer.camera.positionCartographic.height;
}
function zoom(factor) {
  const amount = cameraHeight() * factor;
  if (factor > 0) viewer.camera.zoomIn(amount);
  else viewer.camera.zoomOut(-amount);
}
function tilt(deltaDeg) {
  const cam = viewer.camera;
  const pitch = Cesium.Math.clamp(
    cam.pitch + Cesium.Math.toRadians(deltaDeg),
    Cesium.Math.toRadians(-90),
    Cesium.Math.toRadians(-5)
  );
  cam.setView({ orientation: { heading: cam.heading, pitch, roll: 0 } });
}

document.getElementById("zoomIn").addEventListener("click", () => zoom(0.4));
document.getElementById("zoomOut").addEventListener("click", () => zoom(-0.6));
document.getElementById("tiltUp").addEventListener("click", () => tilt(10));
document.getElementById("tiltDown").addEventListener("click", () => tilt(-10));
document.getElementById("home").addEventListener("click", () => {
  viewer.camera.flyTo({ ...HOME_VIEW, duration: 1.6 });
});

// Keyboard shortcuts: +/- zoom, arrows tilt, H home
window.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  switch (e.key) {
    case "+": case "=": zoom(0.4); break;
    case "-": case "_": zoom(-0.6); break;
    case "ArrowUp":   if (e.shiftKey) { tilt(10);  e.preventDefault(); } break;
    case "ArrowDown": if (e.shiftKey) { tilt(-10); e.preventDefault(); } break;
    case "h": case "H": viewer.camera.flyTo({ ...HOME_VIEW, duration: 1.6 }); break;
  }
});
</script>
